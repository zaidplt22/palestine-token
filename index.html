      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .animate-spin { animation: spin 1s linear infinite; }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }
    .animate-shake { animation: shake 0.5s ease-in-out; }

      border-radius: 0.75rem;

      color: var(--accent-foreground);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--foreground);
    }

    .btn-outline:hover { background: var(--secondary); }

    .btn-ghost {
      background: transparent;
      color: var(--muted-foreground);
    }

    .btn-ghost:hover { background: var(--secondary); }

    .btn-lg {

    function loadFromStorage() {
      try {
        const saved = localStorage.getItem("pt2_state");
        if (saved) {
          const parsed = JSON.parse(saved);
          return { ...parsed, showSplash: true };
        }
      } catch (e) {}
      return initialState;
    }

    function saveToStorage(newState) {
      try {
        localStorage.setItem("pt2_state", JSON.stringify(newState));
      } catch (e) {}
    }

    function emitChange() {
      listeners.forEach(listener => listener());
    }

    function getState() { return state; }
    function subscribe(listener) {
      listeners.add(listener);
      return () => listeners.delete(listener);
    }

    function setState(partial) {
      state = { ...state, ...partial };
      saveToStorage(state);
      emitChange();
    }

    function setGames(partial) {
      state = { ...state, games: { ...state.games, ...partial } };
      saveToStorage(state);
      emitChange();
    }

    function completeTask(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      state = {
        ...state,
        tasks: state.tasks.map(t => t.id === taskId ? { ...t, completed: true } : t),
        balance: state.balance + (task?.reward || 0),
      };
      saveToStorage(state);
      emitChange();
    }

    function initializeStore() {
      state = loadFromStorage();
      if (state.lastDailyLogin) {
        const diff = Date.now() - state.lastDailyLogin;
        if (diff > 24 * 60 * 60 * 1000) {
          state.dailyLoginClaimed = false;
        }
      }
      if (state.miningStartTime) {
        const elapsed = Date.now() - state.miningStartTime;
        const totalTime = 24 * 60 * 60 * 1000;
        state.miningProgress = elapsed >= totalTime ? 100 : (elapsed / totalTime) * 100;
      }
      emitChange();
    }

    // ==================== CANDY GAME (FIXED AUTO-PLAY) ====================
    const COLORS = ["red", "blue", "green", "yellow", "orange"];
    const COLOR_STYLES = {
      red: "linear-gradient(135deg, #ef4444, #dc2626)",
      blue: "linear-gradient(135deg, #3b82f6, #2563eb)",
      green: "linear-gradient(135deg, #10b981, #059669)",
      yellow: "linear-gradient(135deg, #facc15, #eab308)",
      orange: "linear-gradient(135deg, #f97316, #ea580c)",
    };

    function generateBoard() {
      const board = [];
      for (let i = 0; i < 8; i++) {
        const row = [];
        for (let j = 0; j < 8; j++) {
          row.push({
            id: `${i}-${j}`,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            selected: false,
            matched: false,
          });
        }
        board.push(row);
      }
      return board;
    }

    function findMatches(board) {
      const matches = new Set();
      for (let i = 0; i < 8; i++) {
        for (let j = 0; j < 6; j++) {
          if (board[i][j].color === board[i][j + 1].color && board[i][j].color === board[i][j + 2].color) {
            matches.add(`${i}-${j}`);
            matches.add(`${i}-${j + 1}`);
            matches.add(`${i}-${j + 2}`);
          }
        }
      }
      for (let i = 0; i < 6; i++) {
        for (let j = 0; j < 8; j++) {
          if (board[i][j].color === board[i + 1][j].color && board[i][j].color === board[i + 2][j].color) {
            matches.add(`${i}-${j}`);
            matches.add(`${i + 1}-${j}`);
            matches.add(`${i + 2}-${j}`);
          }
        }
      }
      return Array.from(matches).map(m => m.split("-").map(Number));
    }

    function CandyGame() {
      const balance = useStore(s => s.balance);
      const level = useStore(s => s.games.candyLevel);
      const freeBoosters = useStore(s => s.games.candyFreeBoosters);

      const [board, setBoard] = useState(() => generateBoard());
      const [selected, setSelected] = useState(null);
      const [score, setScore] = useState(0);
      const [moves, setMoves] = useState(30);
      const targetScore = level * 500;
      const [showBoosterModal, setShowBoosterModal] = useState(false);
      const [activeBooster, setActiveBooster] = useState(null);
      const [gameState, setGameState] = useState("playing");
      const [showReward, setShowReward] = useState(false);
      const [isProcessingMatch, setIsProcessingMatch] = useState(false);

      // دالة المطابقة مع منع التكرار التلقائي
      const checkMatches = useCallback((fromUserAction = false) => {
        // إذا كانت اللعبة منتهية أو لا توجد حركة من المستخدم فلا تفعل شيئًا
        if (gameState !== "playing") return;
        if (!fromUserAction && moves === 30 && score === 0) return;
        
        const matches = findMatches(board);
        if (matches.length > 0) {
          setIsProcessingMatch(true);
          const newBoard = board.map(row => row.map(cell => ({ ...cell })));
          matches.forEach(([i, j]) => { newBoard[i][j].matched = true; });
          setBoard(newBoard);
          setScore(s => s + matches.length * 10);

          setTimeout(() => {
            const afterRemove = newBoard.map(row =>
              row.map(cell => cell.matched ? { ...cell, color: COLORS[Math.floor(Math.random() * COLORS.length)], matched: false } : cell)
            );
            setBoard(afterRemove);
            setTimeout(() => {
              setIsProcessingMatch(false);
              checkMatches(true);
            }, 150);
          }, 250);
        } else {
          setIsProcessingMatch(false);
        }
      }, [board, gameState, moves, score]);

      // التحقق من الفوز أو الخسارة
      useEffect(() => {
        if (score >= targetScore && gameState === "playing") {
          setGameState("won");
          setShowReward(true);
          setState({ balance: balance + 6 });
          setGames({ candyLevel: level + 1, candyFreeBoosters: 3 });
          setTimeout(() => setShowReward(false), 2000);
        } else if (moves <= 0 && score < targetScore && gameState === "playing") {
          setGameState("lost");
        }
      }, [score, targetScore, moves, gameState, balance, level]);

      const handleCellClick = (i, j) => {
        if (gameState !== "playing") return;
        if (isProcessingMatch) return;

        if (activeBooster === "hammer") {
          const newBoard = board.map(row => row.map(cell => ({ ...cell })));
          newBoard[i][j].color = COLORS[Math.floor(Math.random() * COLORS.length)];
          setBoard(newBoard);
          setActiveBooster(null);
          setTimeout(() => checkMatches(true), 100);
          return;
        }

        if (activeBooster === "bomb") {
          const newBoard = board.map(row => row.map(cell => ({ ...cell })));
          for (let di = -1; di <= 1; di++) {
            for (let dj = -1; dj <= 1; dj++) {
              const ni = i + di, nj = j + dj;
              if (ni >= 0 && ni < 8 && nj >= 0 && nj < 8) {
                newBoard[ni][nj].color = COLORS[Math.floor(Math.random() * COLORS.length)];
              }
            }
          }
          setBoard(newBoard);
          setScore(s => s + 90);
          setActiveBooster(null);
          setTimeout(() => checkMatches(true), 100);
          return;
        }

        if (!selected) {
          setSelected([i, j]);
          const newBoard = board.map(row => row.map(cell => ({ ...cell, selected: false })));
          newBoard[i][j].selected = true;
          setBoard(newBoard);
        } else {
          const [si, sj] = selected;
          const isAdjacent = (Math.abs(si - i) === 1 && sj === j) || (Math.abs(sj - j) === 1 && si === i);

          if (isAdjacent) {
            const newBoard = board.map(row => row.map(cell => ({ ...cell, selected: false })));
            const temp = newBoard[i][j].color;
            newBoard[i][j].color = newBoard[si][sj].color;
            newBoard[si][sj].color = temp;
            setBoard(newBoard);
            setSelected(null);
            setMoves(m => m - 1);
            setTimeout(() => checkMatches(true), 100);
          } else {
            const newBoard = board.map(row => row.map(cell => ({ ...cell, selected: false })));
            setBoard(newBoard);
            setSelected(null);
          }
        }
      };

      const useBooster = (type) => {
        if (freeBoosters > 0) {
          setGames({ candyFreeBoosters: freeBoosters - 1 });
          if (type === "moves") {
            setMoves(m => m + 5);
          } else {
            setActiveBooster(type);
          }
        } else {
          setShowBoosterModal(true);
        }
      };

      // دالة مشاهدة الإعلان الحقيقية مع Adsgram
      const handleWatchAd = () => {
        if (typeof window.adsgram !== 'undefined') {
          const adController = window.adsgram.showAd({

    // ==================== WORD GAME (ARABIC) ====================
    function WordGame() {
      const balance = useStore(s => s.balance);
      const level = useStore(s => s.games.wordLevel);
      const freeHints = useStore(s => s.games.wordFreeHints);

      const puzzle = useMemo(() => ARABIC_PUZZLES[(level - 1) % ARABIC_PUZZLES.length], [level]);
      
      const [foundWords, setFoundWords] = useState([]);
      const [currentWord, setCurrentWord] = useState("");
      const [selectedIndices, setSelectedIndices] = useState([]);
      const [revealedLetters, setRevealedLetters] = useState(new Map());
      const [showHintModal, setShowHintModal] = useState(false);
      const [gameState, setGameState] = useState("playing");
      const [showReward, setShowReward] = useState(false);
      const [shakingWord, setShakingWord] = useState(false);

      const wheelLetters = useMemo(() => {
        const shuffled = [...puzzle.letters];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }, [puzzle.letters]);

      useEffect(() => {
        if (foundWords.length === puzzle.words.length && gameState === "playing") {
          setGameState("won");
          setShowReward(true);
          setState({ balance: balance + 6 });
          setGames({ wordLevel: level + 1, wordFreeHints: 3 });
          setTimeout(() => setShowReward(false), 2000);
        }
      }, [foundWords, puzzle.words.length, gameState, balance, level]);

      const handleLetterClick = (index) => {
        if (gameState !== "playing") return;

        const existingIndex = selectedIndices.indexOf(index);
        if (existingIndex !== -1) {
          setSelectedIndices(selectedIndices.slice(0, existingIndex));
          setCurrentWord(selectedIndices.slice(0, existingIndex).map(i => wheelLetters[i]).join(""));
          return;
        }

        const newIndices = [...selectedIndices, index];
        setSelectedIndices(newIndices);
        setCurrentWord(newIndices.map(i => wheelLetters[i]).join(""));
      };

      const submitWord = () => {
        const word = currentWord;
        if (puzzle.words.includes(word) && !foundWords.includes(word)) {
          setFoundWords([...foundWords, word]);
        } else {
          setShakingWord(true);
          setTimeout(() => setShakingWord(false), 500);
        }
        setCurrentWord("");
        setSelectedIndices([]);
      };

      const clearWord = () => {
        setCurrentWord("");
        setSelectedIndices([]);
      };

      const useHint = () => {
        if (freeHints > 0) {
          const unfoundWords = puzzle.words.filter(w => !foundWords.includes(w));
          if (unfoundWords.length > 0) {
            const word = unfoundWords[0];
            const currentRevealed = revealedLetters.get(word) || 0;
            if (currentRevealed < word.length) {
              const newRevealed = new Map(revealedLetters);
              newRevealed.set(word, currentRevealed + 1);
              setRevealedLetters(newRevealed);
              setGames({ wordFreeHints: freeHints - 1 });
            }
          }
        } else {
          setShowHintModal(true);
        }
      };

      // دالة مشاهدة الإعلان الحقيقية للكلمات
      const handleWatchAd = () => {
        if (typeof window.adsgram !== 'undefined') {
          const adController = window.adsgram.showAd({
            blockId: "28238",
            onReward: (data) => {
              console.log("تم مشاهدة الإعلان بالكامل، مكافأة تلميح", data);
              setGames({ wordFreeHints: freeHints + 1 });
              setShowHintModal(false);
            },
            onError: (error) => {
              console.error("خطأ في عرض الإعلان", error);
              alert("حدث خطأ في الإعلان، حاول مرة أخرى لاحقًا");
            }
          });
        } else {
          alert("مكتبة الإعلانات لم تحمل بعد، تأكد من اتصالك بالإنترنت");
        }
      };

      const handlePayTokens = () => {
        if (balance >= 2) {
          setState({ balance: balance - 2 });
          setGames({ wordFreeHints: freeHints + 1 });
          setShowHintModal(false);
        }
      };

      const resetGame = () => {
        setFoundWords([]);
        setCurrentWord("");
        setSelectedIndices([]);
        setRevealedLetters(new Map());
        setGameState("playing");
      };

      const getLetterPosition = (index, total) => {
        const angle = (index * 2 * Math.PI) / total - Math.PI / 2;
        const radius = 70;
        return { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
      };

      const difficultyLabels = { easy: "سهل", medium: "متوسط", hard: "صعب" };
      const difficultyColors = { easy: "var(--primary)", medium: "var(--accent)", hard: "var(--destructive)" };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '1rem 1rem 6rem', direction: 'rtl' }}>
          {/* Header */}
          <div style={{ width: '100%', maxWidth: '28rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem' }}>
            <button onClick={() => setState({ currentTab: "home" })} style={{ padding: '0.5rem', background: 'none', border: 'none', cursor: 'pointer', color: 'var(--foreground)' }}>
              <Icons.ChevronLeft />
            </button>
            <div style={{ textAlign: 'center' }}>
              <h1 style={{ fontSize: '1.25rem', fontWeight: 'bold', color: 'var(--foreground)' }}>وصلة عربية</h1>
              <p style={{ fontSize: '0.875rem', color: difficultyColors[puzzle.difficulty] }}>
                المستوى {level} - {difficultyLabels[puzzle.difficulty]}
              </p>
            </div>
            <div className="glass" style={{ borderRadius: '0.5rem', padding: '0.25rem 0.75rem' }}>
              <p style={{ fontSize: '0.875rem', color: 'var(--accent)', fontWeight: 500 }}>{balance.toFixed(0)} PT2</p>
            </div>
          </div>

          {/* Crossword Grid */}
          <div className="glass" style={{ width: '100%', maxWidth: '28rem', borderRadius: '1rem', padding: '1rem', marginBottom: '1rem' }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', justifyContent: 'center' }}>
              {puzzle.words.map(word => {
                const isFound = foundWords.includes(word);
                const revealed = revealedLetters.get(word) || 0;
                return (
                  <div key={word} style={{ display: 'flex', gap: '0.25rem', direction: 'rtl' }}>
                    {word.split("").map((letter, i) => (
                      <div
                        key={`${word}-${i}`}
                        style={{
                          width: '2rem', height: '2rem', borderRadius: '0.375rem',
                          display: 'flex', alignItems: 'center', justifyContent: 'center',
                          fontSize: '1rem', fontWeight: 'bold',
                          background: isFound ? 'var(--primary)' : i < revealed ? 'rgba(245, 158, 11, 0.3)' : 'var(--secondary)',
                          color: isFound ? 'var(--primary-foreground)' : i < revealed ? 'var(--accent)' : 'var(--secondary-foreground)'
                        }}
                      >
                        {isFound ? letter : i < revealed ? letter : ""}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
            <p style={{ textAlign: 'center', fontSize: '0.75rem', color: 'var(--muted-foreground)', marginTop: '0.75rem' }}>
              {foundWords.length}/{puzzle.words.length} كلمات
            </p>
          </div>

          {/* Current Word */}
          <div
            className={`glass ${shakingWord ? 'animate-shake' : ''}`}
            style={{
              height: '3rem', borderRadius: '0.75rem', padding: '0 1.5rem',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              marginBottom: '1rem', minWidth: '150px'
            }}
          >
            <span style={{ fontSize: '1.5rem', fontWeight: 'bold', letterSpacing: '0.1em', color: 'var(--foreground)' }}>
              {currentWord || "..."}
            </span>
          </div>

          {/* Letter Wheel */}
          <div style={{ position: 'relative', width: '12rem', height: '12rem', marginBottom: '1.5rem' }}>
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>
              <div className="glass" style={{ width: '4rem', height: '4rem', borderRadius: '50%' }} />
            </div>
            
            {wheelLetters.map((letter, index) => {
              const pos = getLetterPosition(index, wheelLetters.length);
              const isSelected = selectedIndices.includes(index);
              return (
                <button
                  key={`${letter}-${index}`}
                  onClick={() => handleLetterClick(index)}
                  className="glass"
                  style={{
                    position: 'absolute', width: '3rem', height: '3rem', borderRadius: '50%',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: '1.25rem', fontWeight: 'bold', cursor: 'pointer',
                    left: `calc(50% + ${pos.x}px - 24px)`,
                    top: `calc(50% + ${pos.y}px - 24px)`,
                    background: isSelected ? 'var(--primary)' : 'transparent',
                    color: isSelected ? 'var(--primary-foreground)' : 'var(--foreground)',
                    border: 'none'
                  }}
                >
                  {letter}
                </button>
              );
            })}

            <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
              {selectedIndices.length > 1 && selectedIndices.slice(1).map((idx, i) => {
                const prevPos = getLetterPosition(selectedIndices[i], wheelLetters.length);
                const currPos = getLetterPosition(idx, wheelLetters.length);
                return (
                  <line
                    key={`line-${i}`}
                    x1={96 + prevPos.x} y1={96 + prevPos.y}
                    x2={96 + currPos.x} y2={96 + currPos.y}
                    stroke="var(--primary)" strokeWidth="3" strokeLinecap="round"
                  />
                );
              })}
            </svg>
          </div>

          {/* Action Buttons */}
          <div style={{ display: 'flex', gap: '1rem', marginBottom: '1rem' }}>
            <button className="btn btn-outline btn-lg" onClick={clearWord}>
              <Icons.RotateCcw />
            </button>
            <button className="btn btn-primary btn-lg" onClick={submitWord} disabled={currentWord.length < 2} style={{ padding: '0.75rem 2rem' }}>
              تأكيد
            </button>
            <button className="btn btn-outline btn-lg" onClick={useHint} style={{ borderColor: 'var(--accent)', color: 'var(--accent)' }}>
              <Icons.Lightbulb />
              <span style={{ marginRight: '0.25rem', fontSize: '0.75rem' }}>{freeHints > 0 ? freeHints : "إعلان"}</span>
            </button>
          </div>

          {/* Won Modal */}
          {gameState === "won" && (
            <div style={{
              position: 'fixed', inset: 0, zIndex: 50,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: 'rgba(5, 5, 5, 0.8)', backdropFilter: 'blur(4px)'
            }}>
              <div className="glass" style={{ borderRadius: '1rem', padding: '2rem', textAlign: 'center', maxWidth: '20rem', margin: '1rem' }}>
                <h2 style={{ fontSize: '1.875rem', fontWeight: 'bold', color: 'var(--primary)', marginBottom: '0.5rem' }}>مستوى مكتمل!</h2>
                <p style={{ fontSize: '1.125rem', color: 'var(--accent)', marginBottom: '1rem' }}>+6 PT2 ربحت!</p>
                <p style={{ color: 'var(--muted-foreground)', marginBottom: '1.5rem' }}>كل {puzzle.words.length} كلمات وجدت!</p>
                <button className="btn btn-primary" onClick={resetGame}>المستوى التالي</button>
              </div>
            </div>
          )}

          {/* Hint Modal with Real Ads */}
          {showHintModal && (
            <div style={{
              position: 'fixed', inset: 0, zIndex: 50,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: 'rgba(5, 5, 5, 0.8)', backdropFilter: 'blur(4px)', padding: '1rem'
            }} onClick={() => setShowHintModal(false)}>
              <div className="glass" style={{ borderRadius: '1rem', padding: '1.5rem', maxWidth: '20rem', width: '100%' }} onClick={e => e.stopPropagation()}>
                <h3 style={{ fontSize: '1.25rem', fontWeight: 'bold', color: 'var(--foreground)', marginBottom: '0.5rem', textAlign: 'center' }}>تحتاج تلميح؟</h3>
                <p style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)', textAlign: 'center', marginBottom: '1.5rem' }}>
                  استخدمت كل التلميحات المجانية. اختر خياراً:
                </p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                  <button className="btn btn-primary btn-lg" onClick={handleWatchAd} style={{ width: '100%' }}>
                    <Icons.Play /> <span style={{ marginRight: '0.5rem' }}>شاهد إعلان (+1 تلميح)</span>
                  </button>
                  <button className="btn btn-outline btn-lg" onClick={handlePayTokens} disabled={balance < 2} style={{ width: '100%', borderColor: 'var(--accent)', color: 'var(--accent)' }}>
                    <Icons.Coins /> <span style={{ marginRight: '0.5rem' }}>ادفع 2 PT2 (+1 تلميح)</span>
                  </button>
                </div>
                <button className="btn btn-ghost" onClick={() => setShowHintModal(false)} style={{ width: '100%', marginTop: '1rem' }}>إلغاء</button>
              </div>
            </div>
          )}

          {/* Reward */}
          {showReward && (
            <div style={{
              position: 'fixed', top: '25%', left: '50%', transform: 'translateX(-50%)', zIndex: 50,
              background: 'var(--accent)', color: 'var(--accent-foreground)',
              padding: '0.75rem 1.5rem', borderRadius: '9999px', fontWeight: 'bold', fontSize: '1.25rem'

      };

      return (
        <div style={{ padding: '1rem 1rem 6rem', maxWidth: '28rem', margin: '0 auto' }}>
          <div style={{ marginBottom: '1.5rem' }}>
            <h1 style={{ fontSize: '1.5rem', fontWeight: 'bold', color: 'var(--foreground)' }}>المهام</h1>
            <p style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)' }}>أكمل المهام واربح PT2</p>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
            {tasks.map(task => (
              <div key={task.id} className="glass" style={{ borderRadius: '1rem', padding: '1rem', cursor: task.completed ? 'default' : 'pointer' }} onClick={() => handleTaskClick(task)}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                    <div style={{ width: '2.5rem', height: '2.5rem', borderRadius: '50%', background: task.completed ? 'var(--primary)' : 'var(--secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {task.completed ? <Icons.Check /> : <Icons.ExternalLink />}
                    </div>
                    <div>
                      <p style={{ fontWeight: 'bold', color: 'var(--foreground)' }}>{task.title}</p>
                      <p style={{ fontSize: '0.75rem', color: 'var(--muted-foreground)' }}>{task.description}</p>
                    </div>
                  </div>
                  <div style={{ color: 'var(--accent)', fontWeight: 'bold' }}>+{task.reward}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==================== FRIENDS PAGE ====================
    function FriendsPage() {
      const referralCode = useStore(s => s.referralCode);
      const referrals = useStore(s => s.referrals);
      
      const inviteLink = `https://t.me/YourBotUsername?start=${referralCode}`;
      
      const copyToClipboard = () => {
        navigator.clipboard.writeText(inviteLink);
        alert("تم نسخ الرابط!");
      };
      
      const shareLink = () => {
        if (navigator.share) {
          navigator.share({
            title: 'Palestine Token2',
            text: 'انضم إلي واربح PT2!',
            url: inviteLink,
          });
        } else {
          copyToClipboard();
        }
      };

      return (
        <div style={{ padding: '1rem 1rem 6rem', maxWidth: '28rem', margin: '0 auto' }}>
          <div style={{ marginBottom: '1.5rem', textAlign: 'center' }}>
            <h1 style={{ fontSize: '1.5rem', fontWeight: 'bold', color: 'var(--foreground)' }}>الأصدقاء</h1>
            <p style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)' }}>ادعُ أصدقاءك واربح المكافآت</p>
          </div>

          <div className="glass" style={{ borderRadius: '1rem', padding: '1.5rem', textAlign: 'center', marginBottom: '1rem' }}>
            <p style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)' }}>عدد الإحالات</p>
            <p style={{ fontSize: '2.5rem', fontWeight: 'bold', color: 'var(--accent)' }}>{referrals}</p>
          </div>

          <div className="glass" style={{ borderRadius: '1rem', padding: '1.5rem', marginBottom: '1rem' }}>
            <p style={{ fontSize: '0.875rem', color: 'var(--muted-foreground)', marginBottom: '0.5rem' }}>كود الإحالة الخاص بك</p>
            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
              <input type="text" value={referralCode} readOnly className="input" style={{ flex: 1 }} />
              <button className="btn btn-outline" onClick={copyToClipboard}><Icons.Copy /></button>
            </div>
            <button className="btn btn-primary" style={{ width: '100%' }} onClick={shareLink}>
              <Icons.Share /> <span style={{ marginRight: '0.5rem' }}>دعوة الأصدقاء</span>
            </button>
          </div>

          <div className="glass" style={{ borderRadius: '1rem', padding: '1rem' }}>
            <p style={{ fontSize: '0.875rem', color: 'var(--accent)', textAlign: 'center' }}>كل صديق ينضم يمنحك 5 PT2!</p>
          </div>
        </div>
      );
    }

    // ==================== MAIN APP ====================
    function App() {
      const [showSplash, setShowSplash] = useState(true);
      const currentTab = useStore(s => s.currentTab);

      useEffect(() => {
        initializeStore();
      }, []);

      if (showSplash) {
        return <SplashScreen onComplete={() => setShowSplash(false)} />;
      }

      return (
        <div style={{ minHeight: '100vh', paddingBottom: '64px' }}>
          {currentTab === "home" && <MiningDashboard />}
          {currentTab === "candy" && <CandyGame />}
          {currentTab === "words" && <WordGame />}
          {currentTab === "tasks" && <TasksPage />}
          {currentTab === "friends" && <FriendsPage />}
          <BottomNav />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
