<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palestine Token2 Game</title>
    <script src="https://pl29197374.profitablecpmratenetwork.com/4a/a8/65/4aa86588a74b5f50e9491eb2974ef3cd.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .game-header { background: #1a1a1a; padding: 20px; border-bottom: 3px solid #007a3d; }
        .balance-box { font-size: 28px; color: #007a3d; font-weight: bold; }
        .cafe-container { margin: 20px; padding: 20px; background: #161616; border-radius: 15px; border: 1px solid #333; }
        .energy-bar { background: #333; height: 10px; border-radius: 5px; margin: 10px auto; width: 80%; }
        .energy-fill { background: #ee2d35; height: 100%; width: 100%; border-radius: 5px; }
        .btn-action { background: #007a3d; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 90%; margin-top: 10px; }
        .ad-task { border: 1px dashed #ee2d35; padding: 10px; margin-top: 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="game-header">
        <div>رصيد $PT2</div>
        <div id="balance" class="balance-box">0.00</div>
    </div>

    <div class="cafe-container">
        <h3>🏪 كافتيريا الشاي (Tea Tycoon)</h3>
        <p>الأرباح التلقائية: <span style="color:#888;">0.0001 / ساعة</span></p>
        <button class="btn-action" onclick="upgrade()">ترقية المعدات (قريباً)</button>
    </div>

    <div class="cafe-container">
        <h3>⚡ خزان الطاقة</h3>
        <div class="energy-bar"><div class="energy-fill"></div></div>
        <button class="btn-action" style="background:#ee2d35;" onclick="playPuzzle()">لعب الألغاز (Puzzle)</button>
    </div>

    <div class="ad-task">
        <p>📺 شاهد إعلان (رابط مختصر)</p>
        <small>اربح +6 $PT2</small><br>
        <button class="btn-action" onclick="watchAd()" style="background:#444;">بدء المهمة</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let pts = 0;

        function watchAd() {
            // سيفتح البوب أندر تلقائياً بفضل السكريبت
            window.open("https://your-short-link.com", "_blank"); 
            alert("عند العودة، سيتم التحقق من المهمة وإضافة 6 عملات.");
        }

        function playPuzzle() {
            alert("جاري تحميل محرك Match-3... استهلكت 10 طاقة.");
        }

        function upgrade() {
            tg.HapticFeedback.impactOccurred('medium');
            alert("تحتاج إلى رصيد أعلى للترقية.");
        }
    </script>
</body>
</html>
